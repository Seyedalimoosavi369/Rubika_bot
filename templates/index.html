<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRX MINE FIX</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:#0b0f1a;
  color:white;
  text-align:center;
  padding:50px;
}

.box{
  background:#111827;
  padding:20px;
  border-radius:15px;
  border:1px solid #ff1744;
}

button{
  padding:15px 20px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#ff1744;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h1>⛏ TRX MINE TEST</h1>
  <p>اگر این صفحه اومد یعنی مشکل قبلی حل شده ✅</p>

  <h2>💰 موجودی: <span id="bal">0</span> TRX</h2>

  <button onclick="mine()">ماین +4 TRX</button>
</div>

<script>
let bal = 0;

function mine(){
  bal += 4;
  document.getElementById("bal").innerText = bal;
  alert("✅ +4 TRX اضافه شد");
}
</script>

</body>
</html>
